<html>
<head>
<meta charset="utf-8" />
<title>MIAU PORTAL</title>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* эффект телепорта */
video {
  opacity: 0;
  animation: appear 2.5s forwards;
  filter: brightness(1.3) contrast(1.2) saturate(1.2);
  mix-blend-mode: screen;
}

@keyframes appear {
  0% { opacity: 0; transform: scale(0.6); filter: blur(10px); }
  40% { opacity: 1; transform: scale(1.05); filter: blur(2px); }
  100% { opacity: 0.95; transform: scale(1); filter: blur(0); }
}
</style>
</head>

<body>

<a-scene
mindar-image="imageTargetSrc: target.mind;"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false">

<a-assets>
<video id="vid" autoplay loop muted playsinline src="video.mp4"></video>
</a-assets>

<a-camera position="0 0 0" look-controls="false"></a-camera>

<a-entity mindar-image-target="targetIndex: 0">
<a-video src="#vid" position="0 0 0" width="1.2" height="0.7"></a-video>
</a-entity>

</a-scene>

</body>
</html>
