<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>MIAU PORTAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }

  /* Сплэш полностью поверх всего */
  #splash {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: radial-gradient(ellipse at center, #1a0030 0%, #000010 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    transition: opacity 0.6s;
  }
  #splash.fade {
    opacity: 0;
    pointer-events: none;
  }
  #splash.gone { display: none; }

  #splashTitle {
    font-family: Georgia, serif;
    font-size: 2rem;
    color: #e0aaff;
    letter-spacing: 6px;
    text-align: center;
    text-shadow: 0 0 20px #bf5fff, 0 0 40px #7f00ff;
    animation: glow 2s infinite alternate;
  }
  @keyframes glow {
    from { text-shadow: 0 0 10px #bf5fff; }
    to   { text-shadow: 0 0 30px #ff00ff, 0 0 60px #7f00ff; }
  }
  #startBtn {
    padding: 18px 48px;
    font-size: 18px;
    font-family: sans-serif;
    background: linear-gradient(135deg, #9b59b6, #3498db);
    color: #fff;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 0 30px #9b59b688;
    letter-spacing: 3px;
  }
  #startBtn:active { transform: scale(0.95); }

  /* Канвас салюта поверх AR, под сплэшем */
  #fireworks {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 500;
  }

  /* A-Frame занимает весь экран */
  a-scene {
    position: fixed;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
  }
</style>
</head>
<body>

<div id="splash">
  <div id="splashTitle">✦ MIAU PORTAL ✦</div>
  <button id="startBtn">ОТКРЫТЬ ПОРТАЛ</button>
</div>

<canvas id="fireworks"></canvas>

<!--
  КЛЮЧЕВЫЕ ИЗМЕНЕНИЯ:
  1. autoStart убран — сцена стартует сама, камера запрашивается сразу
  2. Сплэш просто визуально перекрывает AR пока пользователь не нажал
  3. После нажатия — убираем сплэш, разблокируем звук/видео
-->
<a-scene
  id="arScene"
  mindar-image="imageTargetSrc: target.mind; uiScanning: no;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  renderer="colorManagement: true; physicallyCorrectLights: true;">

  <a-assets>
    <!-- НЕТ muted — звук будет после жеста -->
    <video
      id="portalVideo"
      src="video.mp4"
      preload="auto"
      loop
      playsinline
      webkit-playsinline
      crossorigin="anonymous">
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- Основное видео — размер подбери под соотношение сторон своего видео -->
    <a-video
      src="#portalVideo"
      position="0 0 0.001"
      width="0.55"
      height="0.31"
      material="shader: flat; transparent: true; opacity: 0.97;">
    </a-video>

    <!-- Пульсирующее свечение -->
    <a-plane
      position="0 0 -0.001"
      width="0.60" height="0.34"
      material="color: #00eeff; opacity: 0.07; transparent: true; shader: flat;"
      animation="property: material.opacity; from: 0.03; to: 0.15; dir: alternate; dur: 1100; loop: true; easing: easeInOutSine;">
    </a-plane>

    <!-- Рамка -->
    <a-plane
      position="0 0 -0.003"
      width="0.63" height="0.37"
      material="color: #cc00ff; opacity: 0.3; transparent: true; shader: flat;"
      animation="property: material.opacity; from: 0.12; to: 0.45; dir: alternate; dur: 850; loop: true; easing: easeInOutSine;">
    </a-plane>

    <!-- Угловые звёздочки -->
    <a-sphere position=" 0.32  0.19 0.05" radius="0.013" material="shader:flat; color:#ff00ff;"
      animation="property: scale; from: 1 1 1; to: 1.8 1.8 1.8; dir: alternate; dur: 700; loop: true;">
    </a-sphere>
    <a-sphere position="-0.32  0.19 0.05" radius="0.013" material="shader:flat; color:#00ffff;"
      animation="property: scale; from: 1 1 1; to: 1.8 1.8 1.8; dir: alternate; dur: 900; loop: true;">
    </a-sphere>
    <a-sphere position=" 0.32 -0.19 0.05" radius="0.013" material="shader:flat; color:#ffff00;"
      animation="property: scale; from: 1 1 1; to: 1.8 1.8 1.8; dir: alternate; dur: 600; loop: true;">
    </a-sphere>
    <a-sphere position="-0.32 -0.19 0.05" radius="0.013" material="shader:flat; color:#ff6600;"
      animation="property: scale; from: 1 1 1; to: 1.8 1.8 1.8; dir: alternate; dur: 800; loop: true;">
    </a-sphere>

  </a-entity>
</a-scene>

<script>
/* ── СПЛЭШ ── */
const splash = document.getElementById('splash');
const btn    = document.getElementById('startBtn');
const video  = document.getElementById('portalVideo');

btn.addEventListener('click', () => {
  // Плавно убираем сплэш
  splash.classList.add('fade');
  setTimeout(() => splash.classList.add('gone'), 650);

  // Разблокируем звук после жеста пользователя
  video.muted = false;
  video.volume = 1.0;
  video.play().catch(() => {
    video.muted = true;
    video.play().catch(() => {});
  });

  // Салют!
  startFireworks(4500);
});

// Когда маркер найден — воспроизводим видео + мини-салют
document.getElementById('arScene').addEventListener('targetFound', () => {
  video.play().catch(() => {});
  startFireworks(2500);
});

/* ── САЛЮТ ── */
const canvas = document.getElementById('fireworks');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = ['#ff00ff','#00ffff','#ffff00','#ff6600','#ffffff','#cc00ff','#00ff88','#ff3399'];
const particles = [];
let fwActive = false, fwInterval = null, rafId = null;

class Particle {
  constructor(x, y) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2.5 + Math.random() * 7;
    this.x = x; this.y = y;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.alpha = 1;
    this.decay = 0.013 + Math.random() * 0.017;
    this.r = 2 + Math.random() * 3;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.trail = [];
  }
  update() {
    this.trail.push({x: this.x, y: this.y, a: this.alpha});
    if (this.trail.length > 9) this.trail.shift();
    this.vy += 0.13;
    this.x += this.vx; this.y += this.vy;
    this.alpha -= this.decay;
  }
  draw() {
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.r * (i / this.trail.length), 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.globalAlpha = t.a * (i / this.trail.length) * 0.35;
      ctx.fill();
    }
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.alpha;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

function burst(x, y, n = 80) {
  for (let i = 0; i < n; i++) particles.push(new Particle(x, y));
}

function randomBurst() {
  burst(
    80 + Math.random() * (canvas.width - 160),
    50 + Math.random() * (canvas.height * 0.55),
    70 + Math.floor(Math.random() * 70)
  );
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].alpha <= 0) particles.splice(i, 1);
  }
  if (fwActive || particles.length > 0) {
    rafId = requestAnimationFrame(loop);
  } else {
    rafId = null;
  }
}

function startFireworks(duration) {
  if (fwInterval) clearInterval(fwInterval);
  fwActive = true;
  for (let i = 0; i < 6; i++) setTimeout(randomBurst, i * 180);
  fwInterval = setInterval(randomBurst, 380);
  if (!rafId) loop();
  setTimeout(() => {
    clearInterval(fwInterval);
    fwActive = false;
  }, duration);
}
</script>
</body>
</html>
