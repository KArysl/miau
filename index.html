<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>MIAU PORTAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: black; }

  /* Кнопка старта (нужна для разблокировки autoplay) */
  #startBtn {
    position: fixed;
    z-index: 999;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    padding: 16px 36px;
    font-size: 20px;
    font-family: sans-serif;
    background: linear-gradient(135deg, #9b59b6, #3498db);
    color: white;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 0 30px #9b59b688;
    letter-spacing: 2px;
  }
  #startBtn:hover { opacity: 0.85; }
  #startBtn.hidden { display: none; }
</style>
</head>
<body>

<button id="startBtn">✦ ОТКРЫТЬ ПОРТАЛ ✦</button>

<a-scene
  id="scene"
  mindar-image="imageTargetSrc: target.mind; autoStart: false;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  renderer="colorManagement: true; physicallyCorrectLights: true;">

  <a-assets>
    <video
      id="video"
      src="video.mp4"
      preload="auto"
      loop
      muted
      playsinline
      crossorigin="anonymous">
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- Голограмма: основное видео -->
    <a-video
      src="#video"
      position="0 0 0.001"
      width="1.2"
      height="0.7"
      material="shader: flat; transparent: true; opacity: 0.95;">
    </a-video>

    <!-- Свечение позади (голо-эффект) -->
    <a-plane
      position="0 0 0"
      width="1.3"
      height="0.78"
      material="color: #00eeff; opacity: 0.08; transparent: true; shader: flat;"
      animation="property: material.opacity; from: 0.04; to: 0.14; dir: alternate; dur: 1200; loop: true; easing: easeInOutSine;">
    </a-plane>

    <!-- Рамка-граница -->
    <a-plane
      position="0 0 -0.001"
      width="1.32"
      height="0.80"
      material="color: #7f00ff; opacity: 0.25; transparent: true; shader: flat;"
      animation="property: material.opacity; from: 0.15; to: 0.4; dir: alternate; dur: 900; loop: true; easing: easeInOutSine;">
    </a-plane>

  </a-entity>
</a-scene>

<script>
  const btn = document.getElementById('startBtn');
  const video = document.getElementById('video');
  const scene = document.getElementById('scene');

  btn.addEventListener('click', () => {
    btn.classList.add('hidden');

    // Разблокируем видео через жест пользователя
    video.play().catch(e => console.warn('Video play error:', e));

    // Запускаем AR
    const sceneEl = scene;
    sceneEl.addEventListener('loaded', () => {
      const arSystem = sceneEl.systems['mindar-image-system'];
      if (arSystem) arSystem.start();
    });

    if (sceneEl.hasLoaded) {
      const arSystem = sceneEl.systems['mindar-image-system'];
      if (arSystem) arSystem.start();
    }
  });

  // Возобновляем видео когда маркер найден
  scene.addEventListener('targetFound', () => {
    video.play().catch(() => {});
  });
</script>

</body>
</html>
