<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>MIAU VIP CLUB</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: radial-gradient(circle at top, #0a0a0a, #000);
    color: white;
    font-family: Arial, sans-serif;
    height: 100dvh;
    overflow: hidden;
  }

  /* 🌌 фоновое свечение */
  #bgGlow {
    position: fixed;
    width: 400px; height: 400px;
    background: radial-gradient(circle, gold, transparent 70%);
    filter: blur(120px);
    opacity: 0.15;
    top: 20%; left: 50%;
    transform: translateX(-50%);
    animation: float 6s infinite ease-in-out;
    pointer-events: none;
  }
  @keyframes float {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(40px); }
  }

  /* ✨ ЭКРАНЫ */
  .screen {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 28px 20px;
    gap: 14px;
  }
  .screen.active {
    display: flex;
    animation: fadeIn 0.55s ease both;
  }
  @keyframes fadeIn {
    from { opacity:0; transform:scale(0.94); }
    to   { opacity:1; transform:scale(1); }
  }

  h1 {
    font-size: clamp(1.4rem, 6vw, 2.2rem);
    letter-spacing: 6px;
    text-shadow: 0 0 25px gold;
  }
  h2 {
    font-size: clamp(1.1rem, 4.5vw, 1.6rem);
    letter-spacing: 3px;
  }
  p { opacity: 0.8; font-size: clamp(0.95rem, 3.5vw, 1.1rem); }

  /* 🔘 КНОПКИ */
  .btns { display:flex; flex-direction:column; gap:10px; width:100%; max-width:280px; }

  button {
    padding: 14px 20px;
    border: none;
    cursor: pointer;
    border-radius: 12px;
    font-size: clamp(15px, 4vw, 17px);
    font-weight: bold;
    letter-spacing: 1px;
    transition: transform .15s, box-shadow .15s;
  }
  button:active { transform: scale(0.96); }

  .gold {
    background: linear-gradient(45deg, #c8960c, #ffdd55, #c8960c);
    background-size: 200%;
    animation: shimmer 3s infinite linear;
    color: black;
    box-shadow: 0 0 22px #ffcc0066;
  }
  @keyframes shimmer {
    0%   { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }
  .white {
    background: rgba(255,255,255,0.12);
    color: white;
    border: 1px solid rgba(255,255,255,0.25);
  }

  /* 🎬 INTRO */
  #intro {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: black;
    text-align: center;
    padding: 28px 20px;
    gap: 16px;
    z-index: 10;
  }
  #intro.gone { display: none; }

  /* ❌ FAIL TOAST */
  #toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    color: white;
    padding: 14px 28px;
    border-radius: 40px;
    font-size: 16px;
    transition: transform 0.4s ease, opacity 0.4s ease;
    opacity: 0;
    z-index: 999;
  }
  #toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* 🏆 WIN */
  #win .badge {
    font-size: 3rem;
    animation: bounce 1s infinite alternate;
  }
  @keyframes bounce {
    from { transform: scale(1); }
    to   { transform: scale(1.15) rotate(3deg); }
  }
  #win .ticket {
    margin-top: 10px;
    border: 2px solid gold;
    border-radius: 16px;
    padding: 18px 28px;
    box-shadow: 0 0 30px #ffcc0044;
    letter-spacing: 2px;
  }

  /* ✦ частицы на WIN */
  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    display: none;
  }
  #particles.on { display: block; }
</style>
</head>
<body>

<div id="bgGlow"></div>
<canvas id="particles"></canvas>

<!-- 🔊 Звуки через Web Audio API — без внешних URL -->
<!-- (генерируем тональные звуки программно, не нужны внешние файлы) -->

<!-- 🌑 INTRO -->
<div id="intro">
  <div style="font-size:3rem">🐆</div>
  <h1>MIAU VIP CLUB</h1>
  <p>доступ только по приглашению</p>
  <div class="btns">
    <button class="gold" onclick="start()">ENTER THE NIGHT</button>
  </div>
</div>

<!-- 1 -->
<div id="s1" class="screen">
  <h1>VIP QUEST</h1>
  <p>ты готов(а) к ночи MIAU?</p>
  <div class="btns">
    <button class="gold" onclick="next(2)">ДА, ГОТОВ(А)</button>
    <button class="white" onclick="fail('доступ всё равно открыт 😼')">НЕТ</button>
  </div>
</div>

<!-- 2 -->
<div id="s2" class="screen">
  <h2>дресс-код принят?</h2>
  <p>шик · глэм · леопард · перья</p>
  <div class="btns">
    <button class="gold" onclick="next(3)">КОНЕЧНО ✦</button>
    <button class="white" onclick="fail('ничего, подберём образ 😉')">НЕ УВЕРЕН(А)</button>
  </div>
</div>

<!-- 3 -->
<div id="s3" class="screen">
  <h2>финальный вход</h2>
  <p>18 июля · ты будешь?</p>
  <div class="btns">
    <button class="gold" onclick="win()">Я ВНУТРИ 🔥</button>
    <button class="white" onclick="fail('ты потеряешь лучшую ночь 😼')">НЕТ</button>
  </div>
</div>

<!-- WIN -->
<div id="win" class="screen" style="z-index:2;">
  <div class="badge">🐆</div>
  <h1>WELCOME TO MIAU</h1>
  <p>ты в VIP списке гостей</p>
  <div class="ticket">
    <div style="font-size:1.4rem; color:gold;">18 JULY</div>
    <div style="opacity:.7; font-size:.9rem; margin-top:4px;">PRIVATE NIGHT · VIP ACCESS</div>
  </div>
  <div class="btns" style="margin-top:8px;">
    <button class="gold" onclick="share()">ПОДЕЛИТЬСЯ 🎉</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ── Web Audio (без внешних файлов) ── */
const AC = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, type, dur, vol=0.3) {
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur);
}

function sfxClick()   { beep(660, 'sine', 0.12, 0.25); }
function sfxPortal()  { beep(220, 'sine', 0.4, 0.3); setTimeout(()=>beep(440,'sine',0.3,0.2),150); }
function sfxSuccess() {
  [523,659,784,1047].forEach((f,i) => setTimeout(()=>beep(f,'sine',0.25,0.28), i*100));
}

/* ── Навигация ── */
function start() {
  if (AC.state === 'suspended') AC.resume();
  sfxPortal();
  document.getElementById('intro').classList.add('gone');
  showScreen('s1');
}

function next(n) {
  sfxClick();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  showScreen('s' + n);
}

function win() {
  sfxSuccess();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  showScreen('win');
  startParticles();
}

function fail(msg) {
  sfxClick();
  showToast(msg);
}

function showScreen(id) {
  // форсируем reflow чтобы анимация сработала повторно
  const el = document.getElementById(id);
  el.classList.remove('active');
  void el.offsetWidth;
  el.classList.add('active');
}

/* ── Toast ── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── Share ── */
function share() {
  sfxClick();
  if (navigator.share) {
    navigator.share({ title: 'MIAU VIP CLUB', text: 'Я в VIP списке MIAU! 🐆 18 июля · Private Night' })
      .catch(() => {});
  } else {
    navigator.clipboard?.writeText('Я в VIP списке MIAU! 🐆 18 июля · Private Night')
      .then(() => showToast('скопировано в буфер 📋'))
      .catch(() => showToast('MIAU VIP · 18 июля 🐆'));
  }
}

/* ── Частицы (конфетти) ── */
const pc = document.getElementById('particles');
const px = pc.getContext('2d');
const COLS = ['#ffd700','#ff69b4','#00ffff','#ff6600','#ffffff','#cc00ff'];
const confetti = [];
let pfActive = false, pfRaf;

function startParticles() {
  pc.classList.add('on');
  pc.width = window.innerWidth; pc.height = window.innerHeight;
  pfActive = true;
  for (let i = 0; i < 120; i++) confetti.push(makeConf());
  pfLoop();
  setTimeout(() => { pfActive = false; }, 4000);
}

function makeConf() {
  return {
    x: Math.random() * window.innerWidth,
    y: -10 - Math.random() * 200,
    r: 4 + Math.random() * 6,
    color: COLS[Math.floor(Math.random() * COLS.length)],
    vx: (Math.random() - 0.5) * 3,
    vy: 2 + Math.random() * 4,
    rot: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.15,
    alpha: 1
  };
}

function pfLoop() {
  px.clearRect(0, 0, pc.width, pc.height);
  for (let i = confetti.length - 1; i >= 0; i--) {
    const c = confetti[i];
    c.x += c.vx; c.y += c.vy; c.rot += c.spin;
    if (c.y > pc.height + 20) {
      if (pfActive) { confetti[i] = makeConf(); }
      else { confetti.splice(i, 1); continue; }
    }
    px.save();
    px.translate(c.x, c.y);
    px.rotate(c.rot);
    px.fillStyle = c.color;
    px.globalAlpha = c.alpha;
    px.fillRect(-c.r/2, -c.r/2, c.r, c.r * 0.5);
    px.restore();
  }
  if (confetti.length > 0) pfRaf = requestAnimationFrame(pfLoop);
  else pc.classList.remove('on');
}
</script>
</body>
</html>
